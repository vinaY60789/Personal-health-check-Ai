<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Health Check</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 320px;
      box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #4facfe;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Health Check AI</h2>

  <input type="text" id="name" placeholder="Your Name">
  <input type="number" id="age" placeholder="Your Age">
  <textarea id="symptoms" placeholder="Enter your symptoms"></textarea>

  <button onclick="checkHealth()">Check</button>

  <div id="result"></div>
</div>

<script>
  async function checkHealth() {
    const name = document.getElementById("name").value;
    const age = document.getElementById("age").value;
    const symptoms = document.getElementById("symptoms").value;

    const response = await fetch("http://127.0.0.1:5000/check", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, age, symptoms })
    });

    const data = await response.json();
    document.getElementById("result").innerText = data.advice;
  }
</script>

</body>
</html>
